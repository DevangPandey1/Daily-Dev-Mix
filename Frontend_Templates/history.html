<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Dev Mix — Listening History</title>
  <style>
    /* ── Base ── */
    body {
      background: #000;
      color: #fff;
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .page-wrap {
      min-height: 100vh;
      padding: 24px;
    }
    @media(min-width:768px){ .page-wrap { padding: 32px; } }

    .page-inner {
      max-width: 1160px;
      margin: 0 auto;
    }

    /* ── Header row ── */
    .header-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
    }

    .back-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      border: 1px solid #282828;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      font-size: 1.1rem;
      transition: background 0.18s;
    }
    .back-btn:hover { background: #282828; }

    .page-title {
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1.0;
      margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: 1.1rem;
      color: #B3B3B3;
    }

    /* ── Stats overview grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 48px;
    }
    @media(min-width:640px){ .stats-grid { grid-template-columns: repeat(4, 1fr); } }

    .stat-card {
      padding: 24px;
      border-radius: 10px;
      border: 1px solid #282828;
    }
    .stat-card-purple { background: linear-gradient(135deg, rgba(168,85,247,0.1), transparent); }
    .stat-card-green  { background: linear-gradient(135deg, rgba(29,185,84,0.1),  transparent); }
    .stat-card-blue   { background: linear-gradient(135deg, rgba(59,130,246,0.1), transparent); }
    .stat-card-pink   { background: linear-gradient(135deg, rgba(236,72,153,0.1), transparent); }

    .stat-icon {
      width: 32px; height: 32px;
      margin-bottom: 12px;
    }
    .icon-purple { color: #c084fc; }
    .icon-green  { color: #1DB954; }
    .icon-blue   { color: #60a5fa; }
    .icon-pink   { color: #f472b6; }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 0.82rem;
      color: #B3B3B3;
    }

    /* ── Section heading ── */
    .section-heading {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    /* ── Session list ── */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .session-card {
      padding: 24px;
      border-radius: 10px;
      background: #181818;
      cursor: pointer;
      transition: background 0.18s;
    }
    .session-card:hover { background: #282828; }

    /* Top row: emoji box + title + date */
    .session-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .session-emoji-box {
      width: 64px; height: 64px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(29,185,84,0.2), rgba(29,185,84,0.05));
      border: 1px solid rgba(29,185,84,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem;
      flex-shrink: 0;
    }

    .session-type {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .session-date {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #B3B3B3;
      flex-wrap: wrap;
    }
    .session-date svg {
      width: 14px; height: 14px;
      flex-shrink: 0;
    }

    /* Bottom row: 3 mini stat boxes */
    .session-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .mini-stat {
      text-align: center;
      padding: 14px 8px;
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
    }
    .mini-stat svg {
      width: 18px; height: 18px;
      margin: 0 auto 6px;
      display: block;
    }
    .mini-stat-val {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .mini-stat-lbl {
      font-size: 0.72rem;
      color: #B3B3B3;
    }

    /* ── Fade-up animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fu { animation: fadeUp 0.45s cubic-bezier(.22,.68,0,1.1) both; }
    .d1 { animation-delay: 0.08s; }
    .d2 { animation-delay: 0.16s; }
    .d3 { animation-delay: 0.24s; }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="page-inner">

    <!-- Header -->
    <div class="header-row fu">
      <a href="home.html" class="back-btn">&#8592;</a>
      <div>
        <h1 class="page-title">Listening History</h1>
        <p class="page-subtitle">Your past sessions and insights</p>
      </div>
    </div>

    <!-- Stats overview (calculated by JS) -->
    <div class="stats-grid fu d1">
      <div class="stat-card stat-card-purple">
        <svg class="stat-icon icon-purple" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <div class="stat-value" id="statSessions">—</div>
        <div class="stat-label">Total Sessions</div>
      </div>
      <div class="stat-card stat-card-green">
        <svg class="stat-icon icon-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <div class="stat-value" id="statTracks">—</div>
        <div class="stat-label">Tracks Played</div>
      </div>
      <div class="stat-card stat-card-blue">
        <svg class="stat-icon icon-blue" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div class="stat-value" id="statHours">—</div>
        <div class="stat-label">Listening Time</div>
      </div>
      <div class="stat-card stat-card-pink">
        <svg class="stat-icon icon-pink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <div class="stat-value" id="statPlaylists">—</div>
        <div class="stat-label">Playlists Created</div>
      </div>
    </div>

    <!-- Sessions list (built by JS) -->
    <div class="fu d2">
      <h2 class="section-heading">Recent Sessions</h2>
      <div class="session-list" id="sessionList"></div>
    </div>

  </div>
</div>

<script>
  // ── Session type lookup ──
  // Maps the session type key to its display label and emoji
  const sessionTypes = {
    'studying':  { label: 'Studying',   emoji: '📚' },
    'workout':   { label: 'Workout',    emoji: '💪' },
    'road-trip': { label: 'Road Trip',  emoji: '🚗' },
    'relaxing':  { label: 'Relaxing',   emoji: '🧘' },
    'party':     { label: 'Party',      emoji: '🎉' },
    'focus':     { label: 'Deep Focus', emoji: '🎯' },
  };

  // ── Mock session data ──
  // Will be replaced with real data from the Spotify API / backend later
  const sessions = [
    {
      id: '1',
      type: 'studying',
      startTime: new Date('2026-03-12T09:00:00'),
      endTime:   new Date('2026-03-12T11:30:00'),
      trackCount: 23,
      avgEnergy: 0.45,
    },
    {
      id: '2',
      type: 'workout',
      startTime: new Date('2026-03-11T18:00:00'),
      endTime:   new Date('2026-03-11T19:15:00'),
      trackCount: 18,
      avgEnergy: 0.87,
    },
    {
      id: '3',
      type: 'relaxing',
      startTime: new Date('2026-03-10T20:00:00'),
      endTime:   new Date('2026-03-10T21:45:00'),
      trackCount: 15,
      avgEnergy: 0.32,
    },
    {
      id: '4',
      type: 'road-trip',
      startTime: new Date('2026-03-09T14:00:00'),
      endTime:   new Date('2026-03-09T16:30:00'),
      trackCount: 28,
      avgEnergy: 0.68,
    },
  ];

  // ── Helper: calculate duration between two dates ──
  function getDuration(start, end) {
    const diffMs = end - start;                          // difference in milliseconds
    const hours   = Math.floor(diffMs / 3600000);        // ms → hours
    const minutes = Math.floor((diffMs % 3600000) / 60000); // remaining ms → minutes
    return { hours, minutes };
  }

  // ── Helper: format a date as "Mar 12, 2026" ──
  function formatDate(date) {
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── Helper: format a date as "09:00 AM" ──
  function formatTime(date) {
    return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  // ── Calculate overview stats ──
  const totalTracks       = sessions.reduce(function(sum, s) { return sum + s.trackCount; }, 0);
  const totalListeningMs  = sessions.reduce(function(sum, s) { return sum + (s.endTime - s.startTime); }, 0);
  const totalHours        = Math.round(totalListeningMs / 3600000);
  const totalPlaylists    = 2; // placeholder — will come from real data later

  document.getElementById('statSessions').textContent  = sessions.length;
  document.getElementById('statTracks').textContent    = totalTracks;
  document.getElementById('statHours').textContent     = totalHours + 'h';
  document.getElementById('statPlaylists').textContent = totalPlaylists;

  // ── Build session cards ──
  const list = document.getElementById('sessionList');

  sessions.forEach(function(session) {
    const info     = sessionTypes[session.type];
    const duration = getDuration(session.startTime, session.endTime);

    const card = document.createElement('div');
    card.className = 'session-card';

    card.innerHTML = `
      <div class="session-top">
        <div class="session-emoji-box">${info.emoji}</div>
        <div>
          <p class="session-type">${info.label}</p>
          <div class="session-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>${formatDate(session.startTime)}</span>
            <span>•</span>
            <span>${formatTime(session.startTime)} – ${formatTime(session.endTime)}</span>
          </div>
        </div>
      </div>

      <div class="session-stats">
        <div class="mini-stat">
          <svg class="icon-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <div class="mini-stat-val">${session.trackCount}</div>
          <div class="mini-stat-lbl">Tracks</div>
        </div>
        <div class="mini-stat">
          <svg class="icon-blue" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <div class="mini-stat-val">${duration.hours}h ${duration.minutes}m</div>
          <div class="mini-stat-lbl">Duration</div>
        </div>
        <div class="mini-stat">
          <svg style="color:#facc15;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          <div class="mini-stat-val">${Math.round(session.avgEnergy * 100)}%</div>
          <div class="mini-stat-lbl">Avg Energy</div>
        </div>
      </div>
    `;

    list.appendChild(card);
  });
</script>

</body>
</html>
